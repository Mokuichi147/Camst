<div class="recording-card rounded-xl overflow-hidden border {{ 'border-amber-400/70 ring-1 ring-amber-400/40' if clip.favorite else 'border-slate-700' }} bg-slate-800/60">
  <video
    class="w-full aspect-video bg-black"
    src="/recordings/media/{{ clip.name }}"
    poster="/recordings/thumbnail/{{ clip.name }}"
    controls
    preload="none"
    playsinline
    muted
  ></video>
  <div class="flex items-center justify-between gap-2 px-3 py-2 text-sm">
    <span class="font-mono text-slate-300">{{ clip.mtime.strftime('%Y-%m-%d %H:%M:%S') }}</span>
    <span class="text-slate-400">{{ '%.1f'|format(clip.size / 1048576) }} MB</span>
  </div>
  <div class="flex items-center justify-between gap-2 px-3 pb-3">
    <a
      href="/recordings/media/{{ clip.name }}"
      download
      class="text-xs text-sky-400 hover:text-sky-300"
    >ダウンロード</a>
    <button
      type="button"
      hx-post="/recordings/favorite/{{ clip.name }}"
      hx-target="closest .recording-card"
      hx-swap="outerHTML"
      title="{{ 'お気に入りから外す(削除されなくなります)' if clip.favorite else 'お気に入りに登録(古くなっても削除されません)' }}"
      class="inline-flex items-center gap-1 rounded-lg px-2 py-1 text-xs font-medium transition {{ 'bg-amber-400/20 text-amber-300 hover:bg-amber-400/30' if clip.favorite else 'bg-slate-700 text-slate-300 hover:bg-slate-600' }}"
    >
      <span>{{ '★' if clip.favorite else '☆' }}</span>
      <span>{{ 'お気に入り' if clip.favorite else 'お気に入り登録' }}</span>
    </button>
  </div>
</div>
