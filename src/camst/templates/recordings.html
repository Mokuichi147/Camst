<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>録画一覧 · Camera Stream</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <header
    class="flex items-center justify-between gap-2 px-3 py-2 bg-slate-900 border-b border-slate-800"
  >
    <h1 class="text-lg sm:text-xl font-semibold">録画一覧</h1>
    <div class="flex items-center gap-3">
      <span class="text-xs text-slate-400 hidden sm:inline">直近30件・1本最大30秒</span>
      <a
        href="/"
        class="px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm font-medium transition"
      >ライブに戻る</a>
    </div>
  </header>

  <main class="p-3 sm:p-4">
    {% if not record %}
    <p class="mb-4 text-sm text-amber-300/90">
      動体検知の記録は無効です。<code class="px-1 rounded bg-slate-800">--record</code> を付けて起動すると記録されます。
    </p>
    {% endif %}

    {% if clips %}
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      {% for clip in clips %}
      <div class="rounded-xl overflow-hidden bg-slate-800/60 border border-slate-700">
        <video
          class="w-full aspect-video bg-black"
          src="/recordings/media/{{ clip.name }}"
          controls
          preload="metadata"
          playsinline
          muted
        ></video>
        <div class="flex items-center justify-between gap-2 px-3 py-2 text-sm">
          <span class="font-mono text-slate-300">{{ clip.mtime.strftime('%Y-%m-%d %H:%M:%S') }}</span>
          <span class="text-slate-400">{{ '%.1f'|format(clip.size / 1048576) }} MB</span>
        </div>
        <div class="px-3 pb-3">
          <a
            href="/recordings/media/{{ clip.name }}"
            download
            class="text-xs text-sky-400 hover:text-sky-300"
          >ダウンロード</a>
        </div>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <p class="text-slate-400">録画はまだありません。</p>
    {% endif %}
  </main>
</body>
</html>
