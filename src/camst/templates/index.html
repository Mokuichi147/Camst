<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OAK-D LITE RGB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<style>
  /* iOS iPhone 用 Fullscreen API フォールバック */
  .pseudo-fullscreen {
    position: fixed !important;
    inset: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    max-width: none !important;
    max-height: none !important;
    border-radius: 0 !important;
    aspect-ratio: auto !important;
    z-index: 9999 !important;
    background: #000 !important;
  }
  .pseudo-fullscreen-lock {
    overflow: hidden !important;
  }
</style>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <header class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <h1 class="text-2xl font-semibold">OAK-D LITE RGB ストリーム</h1>
      <div class="flex items-center gap-3">
        <div
          class="text-sm text-slate-400"
          hx-get="/status"
          hx-trigger="load, every 1s"
          hx-swap="innerHTML"
        >
          接続中…
        </div>
        <button
          id="btn-fullscreen"
          class="px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm font-medium transition"
          type="button"
        >全画面</button>
        <button
          id="btn-pip"
          class="px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm font-medium transition disabled:opacity-40 disabled:cursor-not-allowed"
          type="button"
        >PiP</button>
      </div>
    </header>

    <div
      id="viewer"
      class="relative rounded-2xl overflow-hidden shadow-2xl bg-black aspect-video flex items-center justify-center group"
    >
      <video
        id="stream"
        class="w-full h-full object-contain"
        autoplay
        muted
        playsinline
        controls
      ></video>
    </div>
    <p
      id="conn-state"
      class="text-xs text-slate-500 mt-3"
    >WebRTC · 接続待機中…</p>
  </div>

  <script>
    (() => {
      const viewer = document.getElementById("viewer");
      const video = document.getElementById("stream");
      const btnFs = document.getElementById("btn-fullscreen");
      const btnPip = document.getElementById("btn-pip");
      const connState = document.getElementById("conn-state");

      // --- WebRTC 接続 ---
      const startWebRTC = async () => {
        const pc = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
        });

        pc.addTransceiver("video", { direction: "recvonly" });

        pc.ontrack = (event) => {
          if (video.srcObject !== event.streams[0]) {
            video.srcObject = event.streams[0];
          }
        };

        pc.onconnectionstatechange = () => {
          connState.textContent = "WebRTC · " + pc.connectionState;
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // ICE gathering 完了を待つ(trickle 無し)
        await new Promise((resolve) => {
          if (pc.iceGatheringState === "complete") return resolve();
          const check = () => {
            if (pc.iceGatheringState === "complete") {
              pc.removeEventListener("icegatheringstatechange", check);
              resolve();
            }
          };
          pc.addEventListener("icegatheringstatechange", check);
        });

        const res = await fetch("/offer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sdp: pc.localDescription.sdp,
            type: pc.localDescription.type,
          }),
        });
        const answer = await res.json();
        await pc.setRemoteDescription(answer);
      };
      startWebRTC().catch((err) => {
        console.error(err);
        connState.textContent = "WebRTC · 接続失敗: " + err.message;
      });

      // --- 全画面 ---
      const hasFullscreenApi = !!(
        document.fullscreenEnabled || document.webkitFullscreenEnabled
      );
      const enterPseudo = () => {
        viewer.classList.add("pseudo-fullscreen");
        document.body.classList.add("pseudo-fullscreen-lock");
      };
      const exitPseudo = () => {
        viewer.classList.remove("pseudo-fullscreen");
        document.body.classList.remove("pseudo-fullscreen-lock");
      };
      const isPseudo = () => viewer.classList.contains("pseudo-fullscreen");

      const toggleFullscreen = async () => {
        try {
          if (video.webkitEnterFullscreen && !hasFullscreenApi) {
            video.webkitEnterFullscreen();
            return;
          }
          if (document.fullscreenElement || document.webkitFullscreenElement) {
            (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            return;
          }
          if (isPseudo()) {
            exitPseudo();
            return;
          }
          if (hasFullscreenApi) {
            const req = viewer.requestFullscreen || viewer.webkitRequestFullscreen;
            if (req) {
              await req.call(viewer);
              return;
            }
          }
          enterPseudo();
        } catch {
          enterPseudo();
        }
      };
      btnFs.addEventListener("click", toggleFullscreen);
      document.addEventListener("keydown", (e) => {
        if (e.key === "f" || e.key === "F") toggleFullscreen();
        if (e.key === "Escape" && isPseudo()) exitPseudo();
      });

      // --- PiP ---
      const supportsStandardPip =
        "pictureInPictureEnabled" in document && document.pictureInPictureEnabled;
      const supportsIosPip =
        typeof video.webkitSupportsPresentationMode === "function" &&
        video.webkitSupportsPresentationMode("picture-in-picture");

      if (!supportsStandardPip && !supportsIosPip) {
        btnPip.disabled = true;
        btnPip.title = "このブラウザは PiP に未対応";
      }

      btnPip.addEventListener("click", async () => {
        try {
          if (supportsIosPip) {
            const mode =
              video.webkitPresentationMode === "picture-in-picture"
                ? "inline"
                : "picture-in-picture";
            video.webkitSetPresentationMode(mode);
            return;
          }
          if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
          } else {
            await video.requestPictureInPicture();
          }
        } catch (err) {
          console.error("PiP 失敗:", err);
          alert("PiP を開始できませんでした: " + err.message);
        }
      });
    })();
  </script>
</body>
</html>
