<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Camera Stream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<style>
  html, body {
    margin: 0;
    background: #0f172a; /* slate-900 */
    overflow: hidden;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
  }
  /* ヘッダー高を変数化して video の max-height 計算で利用 */
  :root {
    --header-h: 3rem;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  #stream {
    display: block;
    width: 100vw;
    aspect-ratio: {{ aspect_w }} / {{ aspect_h }};
    max-height: calc(100dvh - var(--header-h) - var(--safe-top) - var(--safe-bottom));
    object-fit: contain;
    background: #000;
  }
  /* iOS iPhone 用 Fullscreen API フォールバック */
  .pseudo-fullscreen {
    position: fixed !important;
    inset: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    max-width: none !important;
    max-height: none !important;
    border-radius: 0 !important;
    aspect-ratio: auto !important;
    z-index: 9999 !important;
    background: #000 !important;
  }
  .pseudo-fullscreen-lock {
    overflow: hidden !important;
  }
</style>
<body
  class="bg-slate-900 text-slate-100"
  style="padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);"
>
  <div class="flex flex-col">
    <header
      class="flex items-center justify-between gap-2 shrink-0 px-3 py-2 bg-slate-900"
      style="height: var(--header-h);"
    >
      <h1 class="min-w-0 truncate text-base sm:text-xl font-semibold">Camera Stream</h1>
      <div class="flex shrink-0 items-center gap-1.5 sm:gap-3">
        <div
          class="text-xs sm:text-sm text-slate-400 whitespace-nowrap"
          hx-get="/status"
          hx-trigger="load, every 1s"
          hx-swap="innerHTML"
        >
          接続中…
        </div>
        <span id="conn-state" class="text-xs text-slate-500 hidden sm:inline">待機中…</span>
        <a
          href="/recordings"
          class="whitespace-nowrap px-2 sm:px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-xs sm:text-sm font-medium transition"
        >記録</a>
        <button
          id="btn-fullscreen"
          class="whitespace-nowrap px-2 sm:px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-xs sm:text-sm font-medium transition"
          type="button"
        >全画面</button>
        <button
          id="btn-pip"
          class="whitespace-nowrap px-2 sm:px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-xs sm:text-sm font-medium transition disabled:opacity-40 disabled:cursor-not-allowed"
          type="button"
        >PiP</button>
      </div>
    </header>

    <main id="viewer" class="relative group">
      <video
        id="stream"
        autoplay
        muted
        playsinline
        controls
      ></video>
    </main>
  </div>

  <script>
    (() => {
      const viewer = document.getElementById("viewer");
      const video = document.getElementById("stream");
      const btnFs = document.getElementById("btn-fullscreen");
      const btnPip = document.getElementById("btn-pip");
      const connState = document.getElementById("conn-state");

      // --- iOS / iPadOS のスクロール完全抑止 ---
      document.addEventListener(
        "touchmove",
        (e) => {
          // <video> の中だけは標準操作(controlsバー等)を許可
          if (e.target.closest && e.target.closest("video")) return;
          e.preventDefault();
        },
        { passive: false }
      );
      window.addEventListener("scroll", () => window.scrollTo(0, 0), {
        passive: true,
      });

      // --- WebRTC 接続(切断時は自動で再接続する) ---
      let pc = null;
      let reconnectTimer = null;

      // 多重に走らないよう、再接続は一度に一つだけ予約する。
      // connected に戻ったら cancelReconnect で取り消す。
      const scheduleReconnect = (delay) => {
        if (reconnectTimer !== null) return;
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          startWebRTC();
        }, delay);
      };
      const cancelReconnect = () => {
        if (reconnectTimer !== null) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
      };

      const connect = async () => {
        // 古い接続が残っていれば、再接続を誘発しないようハンドラを外してから閉じる。
        const prev = pc;
        if (prev) {
          prev.onconnectionstatechange = null;
          try { prev.close(); } catch {}
        }

        const conn = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
        });
        pc = conn;

        conn.addTransceiver("video", { direction: "recvonly" });

        conn.ontrack = (event) => {
          if (video.srcObject !== event.streams[0]) {
            video.srcObject = event.streams[0];
          }
        };

        conn.onconnectionstatechange = () => {
          // すでに別の接続へ作り直していたら、古い接続のイベントは無視する。
          if (conn !== pc) return;
          const state = conn.connectionState;
          connState.textContent = "WebRTC · " + state;
          if (state === "connected") {
            cancelReconnect();
          } else if (state === "failed" || state === "closed") {
            // 回復不能。すぐ作り直す。
            scheduleReconnect(1000);
          } else if (state === "disconnected") {
            // 一時的な切断。少し待って回復しなければ作り直す。
            scheduleReconnect(4000);
          }
        };

        const offer = await conn.createOffer();
        await conn.setLocalDescription(offer);

        // ICE gathering 完了を待つ(trickle 無し)
        await new Promise((resolve) => {
          if (conn.iceGatheringState === "complete") return resolve();
          const check = () => {
            if (conn.iceGatheringState === "complete") {
              conn.removeEventListener("icegatheringstatechange", check);
              resolve();
            }
          };
          conn.addEventListener("icegatheringstatechange", check);
        });

        const res = await fetch("/offer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sdp: conn.localDescription.sdp,
            type: conn.localDescription.type,
          }),
        });
        const answer = await res.json();
        await conn.setRemoteDescription(answer);
      };

      // シグナリング(createOffer や fetch)自体が失敗したときも再接続を予約する。
      const startWebRTC = () => {
        connect().catch((err) => {
          console.error(err);
          connState.textContent = "WebRTC · 接続失敗: " + err.message;
          scheduleReconnect(2000);
        });
      };
      startWebRTC();

      // --- 全画面 ---
      const hasFullscreenApi = !!(
        document.fullscreenEnabled || document.webkitFullscreenEnabled
      );
      const enterPseudo = () => {
        viewer.classList.add("pseudo-fullscreen");
        document.body.classList.add("pseudo-fullscreen-lock");
      };
      const exitPseudo = () => {
        viewer.classList.remove("pseudo-fullscreen");
        document.body.classList.remove("pseudo-fullscreen-lock");
      };
      const isPseudo = () => viewer.classList.contains("pseudo-fullscreen");

      const toggleFullscreen = async () => {
        try {
          if (video.webkitEnterFullscreen && !hasFullscreenApi) {
            video.webkitEnterFullscreen();
            return;
          }
          if (document.fullscreenElement || document.webkitFullscreenElement) {
            (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            return;
          }
          if (isPseudo()) {
            exitPseudo();
            return;
          }
          if (hasFullscreenApi) {
            const req = viewer.requestFullscreen || viewer.webkitRequestFullscreen;
            if (req) {
              await req.call(viewer);
              return;
            }
          }
          enterPseudo();
        } catch {
          enterPseudo();
        }
      };
      btnFs.addEventListener("click", toggleFullscreen);
      document.addEventListener("keydown", (e) => {
        if (e.key === "f" || e.key === "F") toggleFullscreen();
        if (e.key === "Escape" && isPseudo()) exitPseudo();
      });

      // --- PiP ---
      const supportsStandardPip =
        "pictureInPictureEnabled" in document && document.pictureInPictureEnabled;
      const supportsIosPip =
        typeof video.webkitSupportsPresentationMode === "function" &&
        video.webkitSupportsPresentationMode("picture-in-picture");

      if (!supportsStandardPip && !supportsIosPip) {
        btnPip.disabled = true;
        btnPip.title = "このブラウザは PiP に未対応";
      }

      btnPip.addEventListener("click", async () => {
        try {
          if (supportsIosPip) {
            const mode =
              video.webkitPresentationMode === "picture-in-picture"
                ? "inline"
                : "picture-in-picture";
            video.webkitSetPresentationMode(mode);
            return;
          }
          if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
          } else {
            await video.requestPictureInPicture();
          }
        } catch (err) {
          console.error("PiP 失敗:", err);
          alert("PiP を開始できませんでした: " + err.message);
        }
      });
    })();
  </script>
</body>
</html>
